<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - InvBrasil</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="global.css">
</head>
<body class="centralize">
    <form action="">
        <div class="form-field">
            <label>Email</label><br>
            <input type="email" name="email" id="email" onchange="onChangeEmail()" placeholder="seu@email.com">
            <div class="error" id="email-required-error">Email é obrigatório</div>
            <div class="error" id="email-invalid-error">Email é invalido</div>
        </div>
        
        <div class="form-field">
            <label>Senha</label><br>
            <input type="password" name="password" id="password" onchange="onChangePassword()" placeholder="Senha">
            <div class="error" id="password-required-error">Senha é obrigatória</div>
        </div>
        
        <div>
            <button type="button" class="clear" id="recover-password-button" onclick="recoverPassword()" disabled="true">Recuperar Senha</button>
        </div>

        <div>
            <button type="button" class="solid" id="login-button" disabled="true" onclick="login()">Entrar</button>
        </div>

       <div>
            <button type="button" class="outline" onclick="register()">Registrar</button>
       </div>
        
    </form>

    

    <!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/12.11.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/12.11.0/firebase-auth-compat.js"></script>

<!-- Config -->
<script src="config.js"></script>

<!-- Inicialização -->
<script>
    firebase.initializeApp(firebaseConfig);
</script>

<!-- Scripts -->
<script src="script.js"></script>
<script src="validations.js"></script>
<script src="loading.js"></script>
</body>
</html>
